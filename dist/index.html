<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Wobble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }

    #ui-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 20px; left: 20px;
      display: flex;
      gap: 12px;
    }

    .hud-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 10px 20px 12px;
      min-width: 90px;
      text-align: center;
    }

    .hud-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2px;
    }

    .hud-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
      text-shadow: 0 0 16px rgba(255,255,255,0.25);
    }

    /* ── Timer ── */
    #timer-card { padding: 8px 14px 10px; min-width: 0; }

    #timer-wrap {
      position: relative;
      width: 64px;
      height: 64px;
    }

    #timer-svg {
      width: 64px;
      height: 64px;
      transform: rotate(-90deg);
    }

    .timer-track {
      fill: none;
      stroke: rgba(255,255,255,0.1);
      stroke-width: 3.5;
    }

    #timer-ring {
      fill: none;
      stroke: #fff;
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-dasharray: 163.36;
      stroke-dashoffset: 0;
      transition: stroke 0.4s ease;
    }

    #timer-val {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 10px rgba(255,255,255,0.25);
      transition: color 0.4s ease;
    }

    /* ── Game Over overlay ── */
    #game-over-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      pointer-events: none;
    }

    #game-over-overlay.visible {
      display: flex;
      animation: overlayFadeIn 0.4s ease forwards;
    }

    @keyframes overlayFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #game-over-card {
      background: rgba(18,18,18,0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 44px 56px 40px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 24px 48px rgba(0,0,0,0.5);
      animation: cardSlideUp 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
      pointer-events: all;
    }

    @keyframes cardSlideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #game-over-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 0.05em;
      color: #fff;
      text-shadow: 0 0 30px rgba(255,255,255,0.3), 0 2px 8px rgba(0,0,0,0.8);
      margin-bottom: 8px;
    }

    #game-over-reason {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.04em;
      margin-bottom: 32px;
    }

    #game-over-score-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }

    #game-over-score-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 64px;
      font-weight: 900;
      color: #e8e8e8;
      text-shadow: 0 0 30px rgba(255,255,255,0.2), 0 2px 8px rgba(0,0,0,0.8);
      margin-bottom: 36px;
      line-height: 1;
    }

    /* ── Leaderboard ── */
    #score-submit-section {
      width: 100%;
      margin-bottom: 20px;
    }

    #name-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }

    #player-name {
      flex: 1;
      max-width: 180px;
      padding: 10px 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 600;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      color: #fff;
      outline: none;
      transition: border-color 0.15s ease;
    }

    #player-name::placeholder { color: rgba(255,255,255,0.3); }
    #player-name:focus { border-color: rgba(255,255,255,0.45); }

    #submit-score-btn {
      pointer-events: all;
      padding: 10px 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #555, #333);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    #submit-score-btn:hover { background: linear-gradient(135deg, #666, #444); transform: translateY(-1px); }
    #submit-score-btn:active { transform: translateY(0); }
    #submit-score-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

    #submit-status {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin: 8px 0 0;
      min-height: 16px;
      text-align: center;
    }

    #leaderboard-section {
      width: 100%;
      margin-bottom: 20px;
    }

    #leaderboard-title { margin: 0 0 12px; }

    #leaderboard-list li.you {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .lb-rank {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      width: 22px;
      text-align: right;
      flex-shrink: 0;
    }

    .lb-name {
      flex: 1;
      color: rgba(255,255,255,0.85);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lb-score {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #e8e8e8;
      flex-shrink: 0;
    }

    #restart-btn {
      pointer-events: all;
      padding: 14px 44px;
      font-family: 'Orbitron', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #444, #222);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      display: none;
    }

    #restart-btn:hover {
      background: linear-gradient(135deg, #555, #333);
      box-shadow: 0 6px 28px rgba(0,0,0,0.6);
      transform: translateY(-2px);
    }

    #restart-btn:active {
      transform: translateY(0);
    }

    /* ── Controls hint ── */
    /* ── Start screen ── */
    #start-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      pointer-events: all;
      transition: opacity 0.5s ease;
    }

    #start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #start-card {
      background: rgba(18,18,18,0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 52px 64px 48px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 24px 48px rgba(0,0,0,0.5);
    }

    #start-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: #fff;
      text-shadow: 0 0 30px rgba(255,255,255,0.3), 0 2px 8px rgba(0,0,0,0.8);
      margin-bottom: 10px;
    }

    #start-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.06em;
      margin-bottom: 40px;
    }

    #start-controls {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      line-height: 2.1;
      margin-bottom: 40px;
    }

    #start-btn {
      padding: 15px 52px;
      font-family: 'Orbitron', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #444, #222);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    #start-btn:hover {
      background: linear-gradient(135deg, #555, #333);
      box-shadow: 0 6px 28px rgba(0,0,0,0.6);
      transform: translateY(-2px);
    }

    #start-btn:active { transform: translateY(0); }

    #start-leaderboard {
      margin-top: 32px;
      text-align: left;
    }

    .leaderboard-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin: 0 0 12px;
      text-align: center;
    }

    .leaderboard-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .leaderboard-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      background: rgba(255,255,255,0.04);
    }

    #controls-hint {
      position: absolute;
      bottom: 20px; right: 20px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 12px;
      line-height: 2;
      color: rgba(255,255,255,0.45);
    }

    .hint-key {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      padding: 0 6px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.65);
      margin-right: 4px;
    }

    /* ── Pause menu ── */
    #pause-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      pointer-events: none;
    }
    #pause-overlay.visible {
      display: flex;
      pointer-events: all;
      animation: overlayFadeIn 0.2s ease forwards;
    }
    #pause-card {
      background: rgba(18,18,18,0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px 52px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 24px 48px rgba(0,0,0,0.5);
      min-width: 300px;
    }
    #pause-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 32px;
    }
    .volume-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .volume-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      width: 60px;
      text-align: left;
    }
    .volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
      cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }
    .volume-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
    }
    #resume-btn {
      margin-top: 28px;
      padding: 12px 40px;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #444, #222);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      transition: transform 0.15s ease, background 0.15s ease;
      pointer-events: all;
    }
    #resume-btn:hover {
      background: linear-gradient(135deg, #555, #333);
      transform: translateY(-2px);
    }

    /* ── Mobile pause button ── */
    #pause-btn {
      display: none;
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.22);
      color: #fff;
      font-size: 22px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: all;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── Mobile responsive ── */
    @media (pointer: coarse) {
      #pause-btn { display: flex; }
      #controls-hint { display: none; }
    }

    /* Hide pause button when start or game-over overlay is active */
    #start-overlay:not(.hidden) ~ #pause-btn,
    #game-over-overlay.visible ~ #pause-btn { display: none !important; }

    @media (max-width: 480px) {
      .hud-card { padding: 7px 14px 9px; min-width: 70px; }
      .hud-value { font-size: 22px; }

      #start-card { padding: 32px 24px 28px; }
      #start-title { font-size: 36px; }
      #start-subtitle { font-size: 12px; margin-bottom: 28px; }
      #start-controls { font-size: 12px; margin-bottom: 28px; }
      #start-btn { padding: 12px 36px; font-size: 13px; }

      #game-over-card { padding: 28px 28px 24px; }
      #game-over-title { font-size: 36px; }
      #game-over-reason { font-size: 13px; margin-bottom: 20px; }
      #game-over-score-value { font-size: 48px; margin-bottom: 24px; }
      #restart-btn { padding: 12px 32px; font-size: 13px; }

      #pause-card { padding: 28px 28px; min-width: 0; width: 88vw; }
      #pause-title { font-size: 20px; margin-bottom: 20px; }
      #resume-btn { padding: 10px 32px; font-size: 12px; margin-top: 20px; }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-BKGzf9u9.js"></script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-overlay">

    <div id="hud">
      <div class="hud-card">
        <div class="hud-label">Score</div>
        <div class="hud-value" id="score-val">0</div>
      </div>
      <div class="hud-card" id="timer-card" style="display:none;">
        <div class="hud-label">Time</div>
        <div id="timer-wrap">
          <svg id="timer-svg" viewBox="0 0 64 64">
            <circle class="timer-track" cx="32" cy="32" r="26"/>
            <circle id="timer-ring" cx="32" cy="32" r="26"/>
          </svg>
          <div id="timer-val">20</div>
        </div>
      </div>
    </div>

    <div id="start-overlay">
      <div id="start-card">
        <div id="start-title">WOBBLE</div>
        <div id="start-subtitle">Stack blocks. Don't tip the platform.</div>
        <div id="start-controls">
          <span class="hint-key">Click</span> / <span class="hint-key">Space</span> drop &nbsp;·&nbsp;
          <span class="hint-key">R</span> rotate
        </div>
        <button id="start-btn">PLAY</button>
        <div id="start-leaderboard">
          <h3 class="leaderboard-title">Top 10</h3>
          <ol id="start-lb-list" class="leaderboard-list"></ol>
        </div>
      </div>
    </div>

    <div id="game-over-overlay">
      <div id="game-over-card">
        <div id="game-over-title">GAME OVER</div>
        <div id="game-over-reason"></div>
        <div id="game-over-score-label">Final Score</div>
        <div id="game-over-score-value" id="message-text">0</div>

        <div id="score-submit-section">
          <div id="name-row">
            <input id="player-name" type="text" maxlength="20" placeholder="Enter your name" autocomplete="off" spellcheck="false" />
            <button id="submit-score-btn">Submit</button>
          </div>
          <p id="submit-status"></p>
        </div>

        <div id="leaderboard-section" style="display:none;">
          <h3 id="leaderboard-title" class="leaderboard-title">Top 10</h3>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
        </div>

        <button id="restart-btn">PLAY AGAIN</button>
      </div>
    </div>

    <div id="pause-overlay">
      <div id="pause-card">
        <div id="pause-title">PAUSED</div>
        <div class="volume-row">
          <span class="volume-label">Music</span>
          <input class="volume-slider" id="music-vol" type="range" min="0" max="100" value="50">
        </div>
        <div class="volume-row">
          <span class="volume-label">SFX</span>
          <input class="volume-slider" id="sfx-vol" type="range" min="0" max="100" value="100">
        </div>
        <button id="resume-btn">RESUME</button>
      </div>
    </div>

    <button id="pause-btn">⏸</button>

    <div id="controls-hint">
      <span class="hint-key">Click</span> / <span class="hint-key">Space</span> drop block<br>
      <span class="hint-key">R</span> rotate
    </div>

  </div>
</body>
</html>
